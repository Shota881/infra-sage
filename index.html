<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INFRA SAGE v3 — インフラ株AI顧問</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06080b;--s1:#0b0f15;--s2:#10161f;--s3:#151d2a;
  --bd:#1c2836;--bd2:#243245;
  --text:#dde8f5;--t2:#6888a8;--t3:#324558;
  --cyan:#00c8d4;--cyan-d:rgba(0,200,212,.13);
  --amber:#e8a020;--amber-d:rgba(232,160,32,.12);
  --red:#e05555;--red-d:rgba(224,85,85,.13);
  --green:#28d478;--green-d:rgba(40,212,120,.13);
  --purple:#a060f0;--purple-d:rgba(160,96,240,.12);
  --f-jp:'Zen Kaku Gothic New',sans-serif;
  --f-mo:'IBM Plex Mono',monospace;
}
html,body,#root{height:100%;background:var(--bg)}
body{font-family:var(--f-jp);color:var(--text);overflow:hidden}
.app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* HEADER */
.hdr{padding:13px 18px 10px;background:rgba(6,8,11,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#091828,#122040);border:1px solid rgba(0,200,212,.5);display:flex;align-items:center;justify-content:center;font-size:15px}
.hdr-name{font-family:var(--f-mo);font-size:14px;font-weight:500;color:var(--cyan);letter-spacing:2px}
.hdr-sub{font-size:9px;color:var(--t3);letter-spacing:2px}
.hdr-r{display:flex;align-items:center;gap:6px;font-family:var(--f-mo);font-size:9px;color:var(--t3);letter-spacing:1px}
.live{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* TICKER */
.tape{background:var(--s1);border-bottom:1px solid var(--bd);padding:6px 0;overflow:hidden}
.tape-in{display:flex;gap:28px;white-space:nowrap;animation:scroll 28s linear infinite}
.tape-in:hover{animation-play-state:paused}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:5px;font-family:var(--f-mo);font-size:10px}
.ti-s{color:var(--cyan);font-weight:500}.ti-p{color:var(--text)}.ti-c{font-size:9px}
.ti-c.up{color:var(--green)}.ti-c.dn{color:var(--red)}

/* PAGE */
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:68px}
.page::-webkit-scrollbar{width:2px}
.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* NAV */
.nav{position:sticky;bottom:0;background:rgba(6,8,11,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom,6px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0;cursor:pointer;border:none;background:none;color:var(--t3);font-family:var(--f-jp);font-size:9px;letter-spacing:1px;transition:color .2s;position:relative}
.nb.on{color:var(--cyan)}
.nb-ico{font-size:17px}
.nb-badge{position:absolute;top:7px;right:calc(50% - 14px);background:var(--red);color:#fff;border-radius:10px;font-size:8px;font-family:var(--f-mo);padding:1px 5px;min-width:16px;text-align:center}

/* SECTION HEADER */
.sec-hd{padding:14px 18px 8px;display:flex;align-items:center;justify-content:space-between}
.sec-ttl{font-family:var(--f-mo);font-size:10px;letter-spacing:3px;color:var(--t2);text-transform:uppercase}
.sec-sub{font-family:var(--f-mo);font-size:9px;color:var(--t3)}

/* SUMMARY BANNER */
.banner{margin:14px 18px 10px;background:linear-gradient(120deg,#060e1c,#091525);border:1px solid rgba(0,200,212,.18);border-radius:14px;padding:18px;position:relative;overflow:hidden}
.banner::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,212,.06) 0%,transparent 70%)}
.bn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.bn-i .bn-l{font-family:var(--f-mo);font-size:8px;color:var(--t3);letter-spacing:2px;margin-bottom:4px}
.bn-i .bn-v{font-family:var(--f-mo);font-size:15px;font-weight:500}
.bn-v.c{color:var(--cyan)}.bn-v.g{color:var(--green)}.bn-v.a{color:var(--amber)}.bn-v.r{color:var(--red)}

/* SECTOR FILTER */
.sf{padding:4px 18px 10px;display:flex;gap:7px;overflow-x:auto}
.sf::-webkit-scrollbar{display:none}
.sc{flex-shrink:0;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:5px 13px;font-size:11px;font-family:var(--f-mo);color:var(--t2);cursor:pointer;letter-spacing:1px;transition:all .2s;white-space:nowrap}
.sc.on{background:var(--cyan-d);border-color:rgba(0,200,212,.4);color:var(--cyan)}

/* ===== STOCK CARD ===== */
.cards{padding:0 18px;display:flex;flex-direction:column;gap:10px}

.card{
  background:var(--s1);border:1px solid var(--bd);border-radius:14px;
  cursor:pointer;transition:all .2s;overflow:hidden;
  /* NO position:relative so signal bar can be positioned */
  position:relative;
}
.card:active{transform:scale(.985)}
.card.featured{border-color:rgba(0,200,212,.2);background:linear-gradient(135deg,#0b1828,#060f1c)}

/* Left accent bar */
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.s-buy::before{background:var(--green)}
.card.s-hold::before{background:var(--amber)}
.card.s-watch::before{background:var(--cyan)}
.card.s-sell::before{background:var(--red)}

/* ── BUY SIGNAL BANNER (top of card) ── */
.sig-banner{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px 14px;
  border-bottom:1px solid var(--bd);
}
.sig-left{display:flex;align-items:center;gap:8px}
.sig-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.s-buy .sig-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.s-hold .sig-dot{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.s-watch .sig-dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.s-sell .sig-dot{background:var(--red);box-shadow:0 0 6px var(--red)}

.sig-word{font-family:var(--f-mo);font-size:12px;font-weight:500;letter-spacing:2px}
.s-buy .sig-word{color:var(--green)}
.s-hold .sig-word{color:var(--amber)}
.s-watch .sig-word{color:var(--cyan)}
.s-sell .sig-word{color:var(--red)}

.sig-reason-short{font-size:10px;color:var(--t2);line-height:1.4;max-width:220px}

/* ── Card body ── */
.card-body{padding:10px 14px 12px}
.card-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cl{display:flex;align-items:center;gap:9px}
.c-ico{width:36px;height:36px;border-radius:9px;background:var(--s2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:17px}
.c-tic{font-family:var(--f-mo);font-size:14px;font-weight:500;margin-bottom:1px}
.c-nm{font-size:10px;color:var(--t3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cr{text-align:right}
.c-pr{font-family:var(--f-mo);font-size:16px;margin-bottom:3px}
.c-ch{font-family:var(--f-mo);font-size:11px}
.c-ch.up{color:var(--green)}.c-ch.dn{color:var(--red)}

.spark-w{height:28px;margin-bottom:8px}
svg.spark{width:100%;height:100%}

.c-meta{display:flex;gap:12px}
.cm{font-size:10px;color:var(--t3);font-family:var(--f-mo)}
.cm span{color:var(--t2)}

.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:9px;font-family:var(--f-mo);letter-spacing:1px;padding:2px 8px;border-radius:4px;background:var(--s3);border:1px solid var(--bd2);color:var(--t2)}

/* ── Tap hint ── */
.tap-hint{text-align:center;padding:4px 0 0;font-size:9px;color:var(--t3);font-family:var(--f-mo);letter-spacing:1px;border-top:1px solid var(--bd)}

/* ADD BUTTON */
.add-btn{margin:12px 18px 0;width:calc(100% - 36px);background:none;border:1px dashed var(--bd2);border-radius:12px;padding:12px;color:var(--t3);font-family:var(--f-mo);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:2px}

/* ===== DETAIL ===== */
.detail{position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-width:430px;margin:0 auto}
.detail.open{transform:translateY(0)}
.det-hdr{padding:13px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:rgba(6,8,11,.97);backdrop-filter:blur(16px);z-index:10}
.back{width:33px;height:33px;border-radius:9px;background:var(--s2);border:1px solid var(--bd);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.det-t{font-family:var(--f-mo);font-size:15px;font-weight:500}
.det-st{font-size:10px;color:var(--t3);letter-spacing:1px}

.chart-zone{padding:18px 18px 0}
.big-p{font-family:var(--f-mo);font-size:36px;font-weight:300;letter-spacing:-1px;margin-bottom:4px}
.big-c{font-family:var(--f-mo);font-size:13px;margin-bottom:16px}
.big-c.up{color:var(--green)}.big-c.dn{color:var(--red)}
.period-row{display:flex;gap:5px;margin-bottom:13px}
.per{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:6px 0;font-family:var(--f-mo);font-size:10px;color:var(--t3);cursor:pointer;transition:all .15s;letter-spacing:1px}
.per.on{background:var(--cyan-d);border-color:rgba(0,200,212,.4);color:var(--cyan)}
svg.big-chart{width:100%;height:145px}

/* VERDICT BOX (big buy/hold/sell in detail) */
.verdict{margin:0 18px 14px;border-radius:14px;padding:18px}
.verdict.buy{background:var(--green-d);border:1px solid rgba(40,212,120,.3)}
.verdict.hold{background:var(--amber-d);border:1px solid rgba(232,160,32,.3)}
.verdict.watch{background:var(--cyan-d);border:1px solid rgba(0,200,212,.3)}
.verdict.sell{background:var(--red-d);border:1px solid rgba(224,85,85,.3)}
.vd-top{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.vd-word{font-family:var(--f-mo);font-size:30px;font-weight:500;letter-spacing:3px}
.verdict.buy .vd-word{color:var(--green)}
.verdict.hold .vd-word{color:var(--amber)}
.verdict.watch .vd-word{color:var(--cyan)}
.verdict.sell .vd-word{color:var(--red)}
.vd-score-wrap{display:flex;flex-direction:column;gap:4px}
.vd-score-label{font-family:var(--f-mo);font-size:9px;color:var(--t3);letter-spacing:2px}
.vd-score-bar{height:4px;width:80px;background:var(--s3);border-radius:4px;overflow:hidden}
.vd-score-fill{height:100%;border-radius:4px}
.verdict.buy .vd-score-fill{background:var(--green)}
.verdict.hold .vd-score-fill{background:var(--amber)}
.verdict.watch .vd-score-fill{background:var(--cyan)}
.verdict.sell .vd-score-fill{background:var(--red)}
.vd-reason{font-size:12px;color:var(--t2);line-height:1.8}

/* AI CARD */
.ai-card{margin:0 18px 14px;background:linear-gradient(135deg,#07101c,#04090f);border:1px solid rgba(0,200,212,.2);border-radius:14px;padding:18px}
.ai-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px;justify-content:space-between}
.ai-hdr-l{display:flex;align-items:center;gap:9px}
.ai-refresh-btn{background:var(--cyan-d);border:1px solid rgba(0,200,212,.3);border-radius:7px;padding:5px 10px;color:var(--cyan);font-family:var(--f-mo);font-size:9px;cursor:pointer;letter-spacing:1px;white-space:nowrap;transition:background .15s}
.ai-refresh-btn:active{background:rgba(0,200,212,.25)}
.ai-refresh-btn:disabled{opacity:.4;cursor:not-allowed}
.ai-icon{width:28px;height:28px;border-radius:7px;background:var(--cyan-d);border:1px solid rgba(0,200,212,.3);display:flex;align-items:center;justify-content:center;font-size:13px}
.ai-lbl{font-family:var(--f-mo);font-size:10px;color:var(--cyan);letter-spacing:2px}
.ai-body{font-size:13px;line-height:1.9;color:var(--t2)}
.loading{display:flex;align-items:center;gap:8px;color:var(--t3);font-size:11px;font-family:var(--f-mo)}
.dots{display:flex;gap:3px}
.dots span{width:4px;height:4px;background:var(--cyan);border-radius:50%;animation:dp 1.2s ease infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ENTRY BOX */
.entry-box{margin:0 18px 14px;background:var(--s2);border:1px solid var(--bd2);border-radius:13px;padding:15px}
.entry-title{font-family:var(--f-mo);font-size:9px;color:var(--t3);letter-spacing:3px;margin-bottom:12px;text-transform:uppercase}
.entry-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.entry-label{font-size:12px;color:var(--t2)}
.entry-val{font-family:var(--f-mo);font-size:14px}
.ev-buy{color:var(--green)}.ev-target{color:var(--cyan)}.ev-stop{color:var(--red)}
.rr-bar{height:3px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:4px}
.rr-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:3px}
.rr-note{text-align:right;font-family:var(--f-mo);font-size:9px;color:var(--t3);margin-top:4px}

/* CATALYSTS */
.cat-box{margin:0 18px 14px}
.box-ttl{font-family:var(--f-mo);font-size:9px;color:var(--t3);letter-spacing:3px;margin-bottom:10px;text-transform:uppercase}
.cat-item{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;gap:10px}
.cat-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.cat-t{font-size:12px;color:var(--t2);line-height:1.7}
.cat-dir{font-size:10px;font-family:var(--f-mo);letter-spacing:1px;margin-top:2px}
.cat-dir.up{color:var(--green)}.cat-dir.dn{color:var(--red)}.cat-dir.neu{color:var(--amber)}

/* METRICS */
.metrics{margin:0 18px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:12px}
.ml{font-family:var(--f-mo);font-size:9px;color:var(--t3);letter-spacing:2px;margin-bottom:5px}
.mv{font-family:var(--f-mo);font-size:15px}
.mv.g{color:var(--green)}.mv.r{color:var(--red)}.mv.a{color:var(--amber)}.mv.c{color:var(--cyan)}

/* NEWS in detail */
.det-news{padding:0 18px;margin-bottom:24px}
.n-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:8px}
.n-head{font-size:13px;font-weight:500;line-height:1.5;margin-bottom:6px}
.n-imp{font-size:11px;color:var(--t2);line-height:1.6;padding-top:6px;border-top:1px solid var(--bd)}
.n-foot{display:flex;justify-content:space-between;margin-top:7px}
.n-src{font-size:9px;color:var(--t3);font-family:var(--f-mo)}
.n-sen{font-size:9px;font-family:var(--f-mo);padding:2px 8px;border-radius:10px}
.n-sen.pos{background:var(--green-d);color:var(--green)}
.n-sen.neg{background:var(--red-d);color:var(--red)}
.n-sen.neu{background:var(--cyan-d);color:var(--cyan)}

/* ===== AI RECOMMEND TAB ===== */
.reco-banner{
  margin:14px 18px 10px;
  background:linear-gradient(120deg,#0a0820,#100530);
  border:1px solid rgba(160,96,240,.25);border-radius:14px;padding:18px;
  position:relative;overflow:hidden;
}
.reco-banner::after{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(160,96,240,.08) 0%,transparent 70%)}
.reco-banner-title{font-family:var(--f-mo);font-size:11px;color:var(--purple);letter-spacing:3px;margin-bottom:6px}
.reco-banner-body{font-size:12px;color:var(--t2);line-height:1.7}
.reco-refresh{
  margin-top:12px;background:var(--purple-d);border:1px solid rgba(160,96,240,.35);
  border-radius:9px;padding:9px 16px;
  font-family:var(--f-mo);font-size:11px;color:var(--purple);letter-spacing:2px;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;
}

/* RECO CARD */
.reco-cards{padding:0 18px;display:flex;flex-direction:column;gap:12px}
.reco-card{
  background:linear-gradient(135deg,#0c1020,#081028);
  border:1px solid rgba(160,96,240,.2);border-radius:14px;overflow:hidden;
  transition:transform .2s;
}
.reco-card:active{transform:scale(.98)}

.reco-header{
  padding:12px 14px 10px;
  background:linear-gradient(90deg,rgba(160,96,240,.08),transparent);
  border-bottom:1px solid rgba(160,96,240,.12);
  display:flex;align-items:center;justify-content:space-between;
}
.reco-hl{display:flex;align-items:center;gap:9px}
.reco-ico{width:36px;height:36px;border-radius:9px;background:var(--purple-d);border:1px solid rgba(160,96,240,.25);display:flex;align-items:center;justify-content:center;font-size:17px}
.reco-tick{font-family:var(--f-mo);font-size:14px;font-weight:500;margin-bottom:1px}
.reco-nm{font-size:10px;color:var(--t3)}
.reco-sig{font-family:var(--f-mo);font-size:11px;letter-spacing:2px;padding:4px 10px;border-radius:20px}
.reco-sig.buy{background:var(--green-d);color:var(--green);border:1px solid rgba(40,212,120,.3)}
.reco-sig.watch{background:var(--cyan-d);color:var(--cyan);border:1px solid rgba(0,200,212,.3)}
.reco-sig.hold{background:var(--amber-d);color:var(--amber);border:1px solid rgba(232,160,32,.3)}

.reco-body{padding:12px 14px}
.reco-why-label{font-family:var(--f-mo);font-size:9px;color:var(--purple);letter-spacing:2px;margin-bottom:6px}
.reco-why{font-size:12px;color:var(--t2);line-height:1.8;margin-bottom:10px}
.reco-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.rm-item{font-size:10px;color:var(--t3);font-family:var(--f-mo)}
.rm-item span{color:var(--t2)}
.reco-themes{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.reco-theme{font-size:9px;font-family:var(--f-mo);padding:2px 8px;border-radius:4px;background:var(--purple-d);border:1px solid rgba(160,96,240,.2);color:rgba(160,96,240,.8);letter-spacing:1px}

.reco-entry{
  background:rgba(0,0,0,.2);border:1px solid rgba(160,96,240,.12);border-radius:9px;
  padding:10px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
}
.re-item .re-l{font-family:var(--f-mo);font-size:8px;color:var(--t3);letter-spacing:2px;margin-bottom:3px}
.re-item .re-v{font-family:var(--f-mo);font-size:12px}
.re-v.g{color:var(--green)}.re-v.c{color:var(--cyan)}.re-v.r{color:var(--red)}

.reco-add-btn{
  margin-top:10px;width:100%;background:var(--purple-d);border:1px solid rgba(160,96,240,.3);
  border-radius:9px;padding:10px;font-family:var(--f-mo);font-size:11px;color:var(--purple);
  letter-spacing:2px;cursor:pointer;
}

/* NEWS PAGE */
.news-page{padding:0 18px}
.np-card{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:15px;margin-bottom:10px}
.np-sec{font-family:var(--f-mo);font-size:9px;letter-spacing:2px;color:var(--cyan);margin-bottom:5px}
.np-head{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:7px}
.np-ai{font-size:11px;color:var(--t2);line-height:1.7;padding-top:7px;border-top:1px solid var(--bd)}
.np-foot{display:flex;justify-content:space-between;margin-top:7px}

/* MACRO PAGE */
.macro-page{padding:0 18px}
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ind-c{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:12px}
.ind-l{font-family:var(--f-mo);font-size:9px;color:var(--t3);letter-spacing:2px;margin-bottom:4px}
.ind-v{font-family:var(--f-mo);font-size:15px}
.macro-c{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:15px;margin-bottom:10px}
.macro-t{font-family:var(--f-mo);font-size:10px;color:var(--cyan);letter-spacing:2px;margin-bottom:8px}
.macro-b{font-size:12px;color:var(--t2);line-height:1.9}

/* ADD MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);z-index:300;display:flex;align-items:flex-end;max-width:430px;margin:0 auto}
.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:20px 20px 0 0;padding:22px 18px 40px;width:100%}
.modal-t{font-family:var(--f-mo);font-size:13px;letter-spacing:2px;color:var(--cyan);margin-bottom:14px}
.m-inp{width:100%;background:var(--s1);border:1px solid var(--bd2);border-radius:11px;padding:13px 14px;color:var(--text);font-family:var(--f-mo);font-size:14px;outline:none;margin-bottom:11px;letter-spacing:1px}

.pre{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:5px 12px;font-family:var(--f-mo);font-size:11px;color:var(--t2);cursor:pointer}

.m-btn{width:100%;background:linear-gradient(135deg,#00a0aa,var(--cyan));border:none;border-radius:11px;padding:14px;color:#031518;font-family:var(--f-mo);font-size:12px;font-weight:500;cursor:pointer;letter-spacing:3px}

.fade-in{animation:fi .35s ease both}

/* ─── AI FETCH ─── */
function getApiKey(){return localStorage.getItem('infrasage_apikey')||'';}
async function callClaude(prompt){
  const key=getApiKey();
  if(!key) throw new Error('NO_KEY');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    const msg=e.error?.message||`HTTP ${r.status}`;
    if(r.status===401||msg.toLowerCase().includes('api key')||msg.toLowerCase().includes('invalid x-api')||msg.toLowerCase().includes('authentication')){
      throw new Error('INVALID_KEY');
    }
    throw new Error(msg);
  }
  const d=await r.json();
  return d.content?.[0]?.text||'分析を取得できませんでした。';
}

/* ─── SPARKLINE ─── */
function Spark({data,color}){
  const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*100},${28-((v-mn)/r)*24-2}`).join(' ');
  return <svg viewBox="0 0 100 28" className="spark" preserveAspectRatio="none">
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

/* ─── BIG CHART ─── */
function BigChart({data,color}){
  const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*100},${100-((v-mn)/r)*90-4}`).join(' ');
  const area=pts+` 100,100 0,100`;
  return <svg viewBox="0 0 100 100" className="big-chart" preserveAspectRatio="none">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
      <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
    </linearGradient></defs>
    <polygon points={area} fill="url(#ag)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

  const symbol=/^\d{4}$/.test(ticker)?`${ticker}.T`:ticker;

  const attempts=[
    `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`,
    yahooUrl  // 直接アクセスも最後に試す
  ];

  let lastErr;
  for(const url of attempts){
    try{
      const r=await fetch(url,{headers:{Accept:'application/json'}});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      const meta=d.chart?.result?.[0]?.meta;
      if(!meta?.regularMarketPrice) throw new Error('価格データなし');
      return{
        price:meta.regularMarketPrice,
        change:+((meta.regularMarketChange)||0).toFixed(2),
        pct:+((meta.regularMarketChangePercent)||0).toFixed(2)
      };
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error('取得失敗');
}

                  <div style={{position:'absolute',inset:0,background:'rgba(6,8,11,.82)',borderRadius:14,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,zIndex:5}}>
                    <div className="dots"><span/><span/><span/></div>
                    <div style={{fontFamily:'var(--f-mo)',fontSize:10,color:'var(--cyan)',letterSpacing:2}}>AI情報取得中...</div>
                  </div>
                )}
              </div>
            ))}
          </div>

          <button className="add-btn" onClick={()=>setShowAdd(true)}>＋ 銘柄を手動追加</button>
          <div style={{height:20}}/>
        </div>}

        {/* ══ AI RECOMMEND TAB ══ */}
        {tab==='reco'&&<div className="fade-in">
          <div className="reco-banner">
            <div className="reco-banner-title">🤖 AI DISCOVERY</div>
            <div className="reco-banner-body">
              あなたのウォッチリスト（日立・三菱重工・荏原など）をもとに、AIがインフラ系の有望な未発掘銘柄を自動提案します。
            </div>
            <button className="reco-refresh" onClick={generateRecos} disabled={recoLoad}>
              {recoLoad?<><div className="dots" style={{display:'inline-flex'}}><span/><span/><span/></div> 生成中...</>:'🔄 新しい提案を生成'}
            </button>
          </div>

          {recoLoad&&(
            <div style={{padding:'40px 20px',textAlign:'center',color:'var(--t3)',fontFamily:'var(--f-mo)',fontSize:12,letterSpacing:2}}>
              <div className="dots" style={{justifyContent:'center',marginBottom:12}}><span/><span/><span/></div>
              AIが銘柄を分析・厳選中...
            </div>
          )}

          {!recoLoad&&recos.length>0&&(
            <div className="reco-cards">
              {recos.map((r,i)=>(
                <div key={i} className="reco-card fade-in" style={{animationDelay:`${i*.07}s`}}>
                  <div className="reco-header">
                    <div className="reco-hl">
                      <div className="reco-ico">{r.emoji}</div>
                      <div>
                        <div className="reco-tick">{r.ticker}</div>
                        <div className="reco-nm">{r.name} · {r.exchange}</div>
                      </div>
                    </div>
                    <div className={`reco-sig ${r.signal}`}>{sigJP(r.signal)}</div>
                  </div>

                  <div className="reco-body">
                    <div className="reco-why-label">AI推奨理由</div>
                    <div className="reco-why">{r.why}</div>

                    <div className="reco-meta">
                      <div className="rm-item">概算株価 <span>{r.price_approx}</span></div>
                      <div className="rm-item">PER <span>{r.pe_approx}</span></div>
                      <div className="rm-item">配当 <span>{r.div_approx}</span></div>
                    </div>

                    <div className="reco-themes">
                      {(r.themes||[]).map(t=><div key={t} className="reco-theme">{t}</div>)}
                    </div>

                    <div className="reco-entry">
                      <div className="re-item"><div className="re-l">BUY ZONE</div><div className="re-v g">{r.entry_buy}</div></div>
                      <div className="re-item"><div className="re-l">TARGET</div><div className="re-v c">{r.entry_target}</div></div>
                      <div className="re-item"><div className="re-l">STOP</div><div className="re-v r">{r.entry_stop}</div></div>
                    </div>

                    <button className="reco-add-btn" onClick={()=>addRecoToWatch(r)}>
                      ＋ ウォッチリストに追加
                    </button>
                  </div>
                </div>
              ))}
              <div style={{height:16}}/>
            </div>
          )}
        </div>}

        {/* ══ NEWS TAB ══ */}
        {tab==='news'&&<div className="fade-in">
          <div className="sec-hd"><div className="sec-ttl">MARKET NEWS</div><div className="sec-sub">AI影響分析付き</div></div>
          <div className="news-page">
            {stocks.flatMap(s=>s.news.map(n=>({...n,ticker:s.ticker,sector:s.sector}))).map((n,i)=>(
              <div className="np-card fade-in" key={i} style={{animationDelay:`${i*.06}s`}}>
                <div className="np-sec">{n.sector} · {n.ticker}</div>
                <div className="np-head">{n.head}</div>
                <div className="np-ai"><span style={{fontFamily:'var(--f-mo)',fontSize:9,color:'var(--t3)',letterSpacing:1}}>株価影響 ▸ </span>{n.impact}</div>
                <div className="np-foot">
                  <span className="n-src">{n.src} · {n.time}</span>
                  <span className={`n-sen ${n.sent}`}>{n.sent==='pos'?'▲好材料':n.sent==='neg'?'▼悪材料':'●中立'}</span>
                </div>
              </div>
            ))}
          </div>
        </div>}

        {/* ══ MACRO TAB ══ */}
        {tab==='macro'&&<div className="fade-in">
          <div className="sec-hd"><div className="sec-ttl">MACRO・テーマ</div></div>
          <div className="macro-page">
            <div className="ind-grid">
              {[{l:'USD/JPY',v:'152.4',cl:'a'},{l:'日経平均',v:'38,450',cl:'g'},{l:'10Y JGB',v:'0.95%',cl:'c'},{l:'WTI原油',v:'$82.1',cl:'a'}].map(i=>(
                <div className="ind-c" key={i.l}><div className="ind-l">{i.l}</div><div className={`ind-v ${i.cl}`} style={{color:`var(--${i.cl==='g'?'green':i.cl==='c'?'cyan':'amber'})`}}>{i.v}</div></div>
              ))}
            </div>
            {MACRO.map((m,i)=>(
              <div className="macro-c fade-in" key={i} style={{animationDelay:`${i*.07}s`}}>
                <div className="macro-t">{m.t}</div>
                <div className="macro-b">{m.b}</div>
              </div>
            ))}
          </div>
        </div>}

      </div>{/* end page */}

      {/* NAV */}
      <div className="nav">
        {[
          {id:'watch',ico:'📊',lbl:'銘柄'},
          {id:'reco',ico:'🤖',lbl:'AI提案',badge:recos.length>0?recos.length:null},
          {id:'news',ico:'📰',lbl:'ニュース'},
          {id:'macro',ico:'🌐',lbl:'マクロ'},
        ].map(n=>(
          <button key={n.id} className={`nb${tab===n.id?' on':''}`} onClick={()=>setTab(n.id)}>
            {n.badge&&<span className="nb-badge">{n.badge}</span>}
            <span className="nb-ico">{n.ico}</span>{n.lbl}
          </button>
        ))}
      </div>

      {/* DETAIL OVERLAY */}
      {detail&&(
        <div className="detail open">
          <div className="det-hdr">
            <button className="back" onClick={()=>setDetail(null)}>←</button>
            <div className="c-ico">{detail.emoji}</div>
            <div>
              <div className="det-t">{detail.ticker} · {detail.name}</div>
              <div className="det-st">{detail.sector} · {detail.exchange}</div>
            </div>
            <button className="det-del-btn" style={{background:'var(--cyan-d)',border:'1px solid rgba(0,200,212,.3)',color:'var(--cyan)',marginRight:6}}
              onClick={()=>refetchStockInfo(detail)}>
              🔄 情報
            </button>
            <button className="det-del-btn"
              onClick={()=>{if(window.confirm(`${detail.ticker}（${detail.name}）をウォッチリストから削除しますか？`))deleteStock(detail.ticker)}}>
              🗑 削除
            </button>
          </div>

          <div className="chart-zone">
            <div className="big-p">{typeof detail.price==='number'?detail.price.toLocaleString():detail.price}</div>
            <div className={`big-c ${detail.pct>=0?'up':'dn'}`}>{detail.pct>=0?'▲':'▼'}{Math.abs(detail.pct)}%（{detail.pct>=0?'+':''}{detail.change}）</div>
            <div className="period-row">
              {['1W','1M','3M','6M','1Y'].map(p=><button key={p} className={`per${period===p?' on':''}`} onClick={()=>setPeriod(p)}>{p}</button>)}
            </div>
            <BigChart data={detail.hist} color={detail.pct>=0?'var(--green)':'var(--red)'}/>
          </div>

          {/* VERDICT — big buy/hold/sell */}
          <div className={`verdict ${detail.signal}`}>
            <div className="vd-top">
              <div className="vd-word">{sigJP(detail.signal)}</div>
              <div className="vd-score-wrap">
                <div className="vd-score-label">AI総合スコア</div>
                <div className="vd-score-bar">
                  <div className="vd-score-fill" style={{width:`${detail.score}%`}}/>
                </div>
                <div style={{fontFamily:'var(--f-mo)',fontSize:11,color:sigColor(detail.signal),marginTop:2}}>{detail.score}/100</div>
              </div>
            </div>
            <div className="vd-reason">{detail.signal_reason}</div>
          </div>

          {/* AI Analysis */}
          <div className="ai-card">
            <div className="ai-hdr">
              <div className="ai-hdr-l">
                <div className="ai-icon">🤖</div>
                <div className="ai-lbl">CLAUDE AI 詳細分析</div>
              </div>
              <button className="ai-refresh-btn"
                disabled={!!aiLoad[detail.ticker]}
                onClick={()=>refreshAnalysis(detail)}>
                {aiLoad[detail.ticker]?'取得中...':'🔄 更新'}
              </button>
            </div>
            {aiLoad[detail.ticker]
              ?<div className="loading"><div className="dots"><span/><span/><span/></div>分析生成中...</div>
              :<div className="ai-body">{aiText[detail.ticker]||detail.signal_reason}</div>
            }
          </div>

          {/* Entry */}
          <div className="entry-box">
            <div className="entry-title">エントリー目安</div>
            <div className="entry-row"><span className="entry-label">📍 買いゾーン</span><span className="entry-val ev-buy">{detail.entry.buy}</span></div>
            <div className="entry-row"><span className="entry-label">🎯 目標株価</span><span className="entry-val ev-target">{detail.entry.target}</span></div>
            <div className="entry-row" style={{marginBottom:4}}><span className="entry-label">🛑 ストップロス</span><span className="entry-val ev-stop">{detail.entry.stop}</span></div>
            {(()=>{
              const b=parseFloat(detail.entry.buy),t=parseFloat(detail.entry.target),s=parseFloat(detail.entry.stop);
              const valid=!isNaN(b)&&!isNaN(t)&&!isNaN(s)&&b>s&&t>b;
              const rr=valid?((t-b)/(b-s)):null;
              const pct=valid?Math.min(Math.max((rr/4)*100,8),100):65;
              return(<>
                <div className="rr-bar"><div className="rr-fill" style={{width:`${pct}%`}}/></div>
                <div className="rr-note">{rr?`リスクリワード比 推定 1:${rr.toFixed(1)}`:'リスクリワード比 —'}</div>
              </>);
            })()}
          </div>

          {/* Catalysts */}
          <div className="cat-box">
            <div className="box-ttl">カタリスト分析</div>
            {detail.catalysts.map((c,i)=>(
              <div className="cat-item" key={i}>
                <div className="cat-ico">{c.ico}</div>
                <div><div className="cat-t">{c.text}</div>
                  <div className={`cat-dir ${c.dir}`}>{c.dir==='up'?'▲ポジティブ':c.dir==='dn'?'▼ネガティブ':'●中立'}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Metrics */}
          <div className="metrics">
            {[
              {l:'AI総合スコア',v:`${detail.score}/100`,cl:detail.score>=75?'g':detail.score>=55?'a':'r'},
              {l:'PER',v:detail.pe,cl:''},
              {l:'配当利回り',v:detail.div,cl:'g'},
              {l:'時価総額',v:detail.mktcap,cl:'c'},
              {l:'前日比',v:`${detail.pct>=0?'+':''}${detail.pct}%`,cl:detail.pct>=0?'g':'r'},
              {l:'シグナル',v:sigJP(detail.signal),cl:detail.signal==='buy'?'g':detail.signal==='hold'?'a':'c'},
            ].map(m=>(
              <div className="mc" key={m.l}><div className="ml">{m.l}</div><div className={`mv ${m.cl}`}>{m.v}</div></div>
            ))}
          </div>

          {/* News */}
          {detail.news.length>0&&(
            <div className="det-news">
              <div className="box-ttl">関連ニュース</div>
              {detail.news.map((n,i)=>(
                <div className="n-card" key={i}>
                  <div className="n-head">{n.head}</div>
                  <div className="n-imp"><span style={{fontFamily:'var(--f-mo)',fontSize:9,color:'var(--t3)',letterSpacing:1}}>株価影響 ▸ </span>{n.impact}</div>
                  <div className="n-foot">
                    <span className="n-src">{n.src} · {n.time}</span>
                    <span className={`n-sen ${n.sent}`}>{n.sent==='pos'?'▲好材料':'▼悪材料'}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{height:30}}/>
        </div>
      )}

      {/* API KEY MODAL */}
      {showApiModal&&(
        <div className="api-modal-bg" onClick={e=>{if(e.target===e.currentTarget)setShowApiModal(false)}}>
          <div className="api-modal">
            <div className="modal-hd">
              <div className="api-modal-t" style={{margin:0}}>🔑 ANTHROPIC API KEY</div>
              <button className="modal-close" onClick={()=>setShowApiModal(false)}>×</button>
            </div>
            <div className="api-modal-sub">
              AI分析・銘柄提案機能の利用にはAnthropicのAPIキーが必要です。<br/>
              キーはこの端末のlocalStorageにのみ保存されます。
            </div>
            <div className="api-modal-warn">
              ⚠️ ブラウザから直接APIを呼び出します。このキーは個人利用のみに使用し、第三者と共有しないでください。
            </div>
            <input className="api-key-inp" type="password" placeholder="sk-ant-api03-..."
              value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&saveApiKey()}/>
            <div className="api-btns">
              <button className="api-save-btn" onClick={saveApiKey}>保存する</button>
              <button className="api-clear-btn" onClick={()=>{localStorage.removeItem('infrasage_apikey');setApiKey('');setApiKeyInput('');setShowApiModal(false);showToast('APIキーをクリアしました');}}>クリア</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD MODAL */}
      {showAdd&&(
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setShowAdd(false)}}>
          <div className="modal">
            <div className="modal-hd">
              <div className="modal-t" style={{margin:0}}>銘柄を手動追加</div>
              <button className="modal-close" onClick={()=>setShowAdd(false)}>×</button>
            </div>
            <input className="m-inp" placeholder="証券コードまたはティッカー (例: 6326, GE)"
              value={newTick} onChange={e=>setNewTick(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addStock()}/>
            <input className="m-inp" placeholder="企業名ヒント（任意）— 誤認識防止 例: クボタ"
              value={nameHint} onChange={e=>setNameHint(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addStock()}
              style={{fontSize:12,color:'var(--t2)'}}/>
            <div className="pre-wrap">
              {['6503','6302','6326','9501','XYL','GE','EMR','CARR'].map(t=>(
                <div key={t} className="pre" onClick={()=>setNewTick(t)}>{t}</div>
              ))}
            </div>
            <button className="m-btn" onClick={addStock}>追加する</button>
          </div>
        </div>
      )}

      <div className="disclaimer">※ 投資助言ではありません。最終判断は自己責任でお願いします。</div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
